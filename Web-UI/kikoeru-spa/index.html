  <body>
    <noscript>
      We are sorry, but Kikoeru requires Javascript to work.
    </noscript>
    <!-- DO NOT touch the following DIV -->
    <div id="q-app"></div>
    <button id="asmr-index-refresh" title="Refresh ASMR index and cover metadata">↻</button>
    <a id="asmr-library-dashboard-link" title="ASMR library dashboard" href="/asmr-library">☷</a>
    <script>
      (function () {
        var btn = document.getElementById('asmr-index-refresh')
        if (!btn) return
        function currentWorkRj () {
          var m = window.location.pathname.match(/^\/work\/(RJ\d+)/i)
          return m ? m[1].toUpperCase() : ''
        }
        function jsonFetch (path, opts) {
          return fetch(path, opts).then(function (r) {
            return r.json().then(function (j) {
              if (!r.ok) throw new Error(j.error || r.statusText)
              return j
            })
          })
        }
        function waitAction (id) {
          return new Promise(function (resolve, reject) {
            function poll () {
              jsonFetch('/api/asmr-library/actions/' + encodeURIComponent(id))
                .then(function (action) {
                  if (action.status === 'running') return setTimeout(poll, 1200)
                  if (action.status === 'done') return resolve(action)
                  reject(new Error(action.error || action.output || 'Action failed'))
                })
                .catch(reject)
            }
            poll()
          })
        }
        function runWorkRefresh (rj) {
          return jsonFetch('/api/asmr-library/actions/fix-content', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({rj: rj})
          }).then(function (action) {
            return waitAction(action.id)
          }).then(function () {
            return jsonFetch('/api/admin/reindex', { method: 'POST' })
          })
        }
        btn.addEventListener('click', function () {
          var old = btn.textContent
          var rj = currentWorkRj()
          btn.disabled = true
          btn.textContent = '…'
          var work = rj ? runWorkRefresh(rj) : jsonFetch('/api/admin/reindex', { method: 'POST' })
          work.then(function (res) {
              btn.textContent = '✓'
              console.log(rj ? 'ASMR work refresh result:' : 'ASMR index refresh result:', res)
              setTimeout(function () {
                btn.textContent = old
                btn.disabled = false
                if (rj) window.location.reload()
              }, 900)
            })
            .catch(function (err) {
              btn.textContent = '!'
              console.error('ASMR refresh failed:', err)
              setTimeout(function () { btn.textContent = old; btn.disabled = false }, 2200)
            })
        })
      }())
    </script>
    <script type="text/javascript" src="/js/asmr-work-delete.js"></script>
    <script>
      (function () {
        var current = ''
        function workIdFromPath () {
          var m = window.location.pathname.match(/^\/work\/(RJ\d+)/i)
          return m ? m[1].toUpperCase() : ''
        }
        function removeCover () {
          var old = document.getElementById('asmr-work-cover-panel')
          if (old) old.remove()
        }
        function insertCover (id) {
          var root = document.querySelector('.q-page')
          if (!root || document.getElementById('asmr-work-cover-panel')) return
          fetch('/api/work/' + encodeURIComponent(id))
            .then(function (r) { return r.ok ? r.json() : null })
            .then(function (work) {
              if (!work || !work.has_cover) return
              var panel = document.createElement('a')
              panel.id = 'asmr-work-cover-panel'
              panel.className = 'asmr-work-cover-panel'
              panel.href = work.coverUrl || ('/api/covers/' + id)
              panel.target = '_blank'
              panel.rel = 'noopener'
              var img = document.createElement('img')
              img.alt = work.title || id
              img.src = (work.coverUrl || ('/api/covers/' + id)) + '?v=' + Date.now()
              panel.appendChild(img)
              root.insertBefore(panel, root.firstChild)
            })
            .catch(function (err) { console.warn('ASMR work cover insert failed:', err) })
        }
        function syncCover () {
          var id = workIdFromPath()
          if (!id) {
            current = ''
            removeCover()
            return
          }
          if (id === current && document.getElementById('asmr-work-cover-panel')) return
          current = id
          removeCover()
          setTimeout(function () { insertCover(id) }, 250)
          setTimeout(function () { insertCover(id) }, 1200)
        }
        ;['pushState', 'replaceState'].forEach(function (name) {
          var original = history[name]
          history[name] = function () {
            var result = original.apply(this, arguments)
            setTimeout(syncCover, 0)
            return result
          }
        })
        window.addEventListener('popstate', syncCover)
        new MutationObserver(syncCover).observe(document.getElementById('q-app'), { childList: true, subtree: true })
        syncCover()
      }())
    </script>
